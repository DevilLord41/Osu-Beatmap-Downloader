name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Publish self-contained
        run: dotnet publish OsuBmDownloader/OsuBmDownloader.csproj -c Release -r win-x64 --self-contained -o publish

      - name: Zip release
        run: Compress-Archive -Path publish/* -DestinationPath OsuBmDownloader-${{ github.ref_name }}-win-x64.zip
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: OsuBmDownloader-${{ github.ref_name }}-win-x64.zip
          generate_release_notes: true
